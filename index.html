<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixFirst - Infrastructure Issue Reporting</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <div class="logo-icon">
                    <img id="logoImg" src="assets/logo.png" alt="FixFirst Logo" width="45" height="45">
                </div>
                <div class="logo-text">
                    <h1><span class="logo-fix">Fix</span><span class="logo-first">First</span></h1>
                    <p class="tagline">Report road issues. Fix them first.</p>
                </div>
            </div>
            
            <!-- Feature Badges -->
            <div class="features-showcase">
                <div class="feature-badge">
                    <div class="badge-icon">🎯</div>
                    <div class="badge-text">
                        <div class="badge-title">Duplicate Detection</div>
                        <div class="badge-desc">50m radius check</div>
                    </div>
                </div>
                
                <div class="feature-badge">
                    <div class="badge-icon">👍</div>
                    <div class="badge-text">
                        <div class="badge-title">Community Voting</div>
                        <div class="badge-desc">Upvote priority</div>
                    </div>
                </div>
                
                <div class="feature-badge">
                    <div class="badge-icon">📸</div>
                    <div class="badge-text">
                        <div class="badge-title">Photo Evidence</div>
                        <div class="badge-desc">Visual verification</div>
                    </div>
                </div>
                
                <div class="feature-badge">
                    <div class="badge-icon">📍</div>
                    <div class="badge-text">
                        <div class="badge-title">GPS Tracking</div>
                        <div class="badge-desc">Auto-location</div>
                    </div>
                </div>
            </div>
            
            <nav class="nav" id="mainNav"></nav>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app"></main>

    <!-- Issue Detail Modal -->
    <div class="modal" id="issueModal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Map Modal -->
    <div class="modal" id="mapModal">
        <div class="modal-overlay" onclick="closeMapModal()"></div>
        <div class="modal-content modal-large">
            <button class="modal-close" onclick="closeMapModal()">&times;</button>
            <div id="mapModalBody"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Custom JS -->
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/map.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/citizen.js"></script>
    <script src="js/authority.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
